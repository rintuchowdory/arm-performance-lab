stages:
  - build
  - benchmark
  - select

variables:
  DOCKER_DRIVER: overlay2

before_script:
  - echo "Starting pipeline..."

# ---------------------------------------------------------
# BUILD STAGE
# ---------------------------------------------------------
build_images:
  stage: build
  script:
    - echo "Building Docker images..."
    - docker build -t alpine-test -f docker/alpine.Dockerfile .
    - docker build -t ubuntu-test -f docker/ubuntu-minimal.Dockerfile .
    - docker build -t debian-slim-test -f docker/debian-slim.Dockerfile .
    - docker build -t busybox-test -f docker/busybox.Dockerfile .

    - echo "Saving images as tar files..."
    - docker save alpine-test -o alpine-test.tar
    - docker save ubuntu-test -o ubuntu-test.tar
    - docker save debian-slim-test -o debian-slim-test.tar
    - docker save busybox-test -o busybox-test.tar
  artifacts:
    paths:
      - alpine-test.tar
      - ubuntu-test.tar
      - debian-slim-test.tar
      - busybox-test.tar
  only:
    - master

# ---------------------------------------------------------
# BENCHMARK STAGE
# ---------------------------------------------------------
benchmark:
  stage: benchmark
  script:
    - echo "Running CPU benchmark..."
    - bash benchmarks/cpu.sh > cpu.txt

    - echo "Running memory benchmark..."
    - bash benchmarks/memory.sh > memory.txt

    - echo "Running I/O benchmark..."
    - bash benchmarks/io.sh > io.txt

    - echo "Running package install benchmark..."
    - bash benchmarks/package-install.sh > pkg.txt
  artifacts:
    paths:
      - cpu.txt
      - memory.txt
      - io.txt
      - pkg.txt
  only:
    - master

# ---------------------------------------------------------
# SELECT FASTEST IMAGE
# ---------------------------------------------------------
select_fastest:
  stage: select
  script:
    - echo "Selecting fastest image..."
    - bash scripts/select_fastest.sh
  artifacts:
    paths:
      - fastest.txt
      - summary.md
  only:
    - master
